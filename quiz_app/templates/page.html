<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>QUIZ APPLICATION</title>
    {% load static %}
    <link rel="icon" href="{% static 'favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/quiz_page.css' %}" rel="stylesheet">
</head>
<body>
    <div class="app">

        <div class="d-flex justify-content-between">
            <h6 id="attempt">🎯 Attempts Left : 3</h6>
            <h6 id="score">🏆 Score : 0</h6>
        </div>

        <h6 id="qno" class="border-bottom p-3 text-center">
            QUIZ NO : 1
        </h6>

        <div class="quiz">

            <div class="ques d-flex gap-3 mt-5">
                <div id="num1" class="btn border"></div>
                <div id="op" class="fs-3"></div>
                <div id="num2" class="btn border"></div>
                <div class="fs-3">=</div>
                <div id="quesM" class="btn border">?</div>
            </div>

            <div class="ans_b mt-5">
                <input required id="check_ans" type="text" class="form-control" placeholder="Answer">
            </div>

            <p id="result" class="mt-3 text-center"></p>

            <div class="text-center mt-4">
                <button id="submitBtn" type="button" class="btn btn-outline-secondary">Submit</button>
            </div>
        </div>
    </div>
    <script src="{% static 'js/quiz_page.js' %}"></script>
</body>
</html>
