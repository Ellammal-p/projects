<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/quiz_page.css' %}" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-shell">
        <div class="login-box" style="max-width:700px; padding:24px; border-radius:24px;">
            <h3 class="text-center mb-2">Admin Dashboard</h3>
            <p class="text-center text-white-50 small mb-3">Create student profiles and view generated credentials.</p>
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <div class="d-flex justify-content-end mb-2">
                <a href="{% url 'student_list_page' %}" class="btn btn-outline-light">View Student List</a>
            </div>

            <form method="post" action="{% url 'create_student_profile' %}" class="mb-3">
                {% csrf_token %}
                <div class="d-grid gap-3">
                    <div>
                        <label class="form-label">Student Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter student name" required>
                    </div>
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 login-btn mt-2">Create Student Profile</button>
            </form>

        </div>
    </div>
</body>
</html>
