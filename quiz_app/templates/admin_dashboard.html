<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/quiz_page.css' %}" rel="stylesheet">
</head>
<body class="login-page">
    <div class="login-shell">
        <div class="login-box" style="max-width:700px; padding:24px; border-radius:24px;">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="mb-0">Add Student</h3>
                <div class="d-flex gap-2">
                    <a href="{% url 'logout_user' %}" class="btn btn-outline-secondary btn-sm">Logout</a>
                    <a href="{% url 'student_list_page' %}" class="btn btn-danger">View Student List</a>
                </div>
            </div>
            {% if messages %}
                <div class="flash-message">
                    {% for message in messages %}
                        <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}success{% endif %} mb-2" role="alert">
                            <span>{{ message }}</span>
                            <button type="button" class="close-btn" aria-label="Close" onclick="this.parentElement.remove();">&times;</button>
                        </div>
                    {% endfor %}
                </div>
            {% endif %}

            <form method="post" action="{% url 'create_student_profile' %}" class="mb-3">
                {% csrf_token %}
                <div class="d-grid gap-3">
                    <div>
                        <label class="form-label">Student Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter student name" required>
                    </div>
                    <div>
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter email" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 login-btn mt-2">Create Student Profile</button>
            </form>

        </div>
    </div>
    <script>
        setTimeout(function () {
            document.querySelectorAll('.flash-message .alert').forEach(function (el) {
                el.classList.add('fade');
                setTimeout(function () { el.remove(); }, 300);
            });
        }, 3000);
    </script>
</body>
</html>
